name: Deploy backend service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and restart backend on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER || 'root' }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -eu

            SERVICE_NAME="xiyu-backend"
            APP_DIR="/opt/xiyu/backend"
            LOG_DIR="/opt/xiyu/logs"
            UPLOAD_DIR="/opt/xiyu/uploadPath"
            BUILD_DIR="/tmp/xiyu-backend-src"
            JAR_PATH="$APP_DIR/ruoyi-admin.jar"
            REPO_URL="https://github.com/jiangyi3265/xiyu-backend.git"
            COMMIT_SHA="${{ github.sha }}"

            mkdir -p "$APP_DIR" "$LOG_DIR" "$UPLOAD_DIR"
            rm -rf "$BUILD_DIR"
            for i in $(seq 1 5); do
              if git clone --depth 1 "$REPO_URL" "$BUILD_DIR"; then
                break
              fi
              rm -rf "$BUILD_DIR"
              sleep $((i * 5))
            done
            test -d "$BUILD_DIR/.git"
            cd "$BUILD_DIR"
            for i in $(seq 1 5); do
              if git fetch --depth 1 origin "$COMMIT_SHA"; then
                break
              fi
              sleep $((i * 5))
            done
            git checkout "$COMMIT_SHA"
            mvn -B -DskipTests clean package
            install -m 0644 "$BUILD_DIR/ruoyi-admin/target/ruoyi-admin.jar" "$JAR_PATH"

            JAVA_BIN="$(command -v java || true)"
            if [ -z "$JAVA_BIN" ]; then
              echo "java was not found on the server"
              exit 1
            fi

            cat > "$APP_DIR/$SERVICE_NAME.env.new" <<'ENVEOF'
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            RUOYI_TOKEN_SECRET=${{ secrets.RUOYI_TOKEN_SECRET }}
            WX_APPID=${{ secrets.WX_APPID }}
            WX_SECRET=${{ secrets.WX_SECRET }}
            WX_MCH_ID=${{ secrets.WX_MCH_ID }}
            WX_API_KEY=${{ secrets.WX_API_KEY }}
            WX_NOTIFY_URL=${{ secrets.WX_NOTIFY_URL }}
            WX_CERT_PATH=${{ secrets.WX_CERT_PATH }}
            ENVEOF
            awk -F= 'index($0, "=") && length(substr($0, index($0, "=") + 1)) > 0 { print }' "$APP_DIR/$SERVICE_NAME.env.new" > "$APP_DIR/$SERVICE_NAME.env"
            rm -f "$APP_DIR/$SERVICE_NAME.env.new"
            chmod 600 "$APP_DIR/$SERVICE_NAME.env"

            cat > "/etc/systemd/system/$SERVICE_NAME.service" <<SERVICEEOF
            [Unit]
            Description=Xiyu Backend Service
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=$APP_DIR
            Environment=RUOYI_PROFILE=$UPLOAD_DIR
            EnvironmentFile=-$APP_DIR/$SERVICE_NAME.env
            ExecStart=$JAVA_BIN -jar $JAR_PATH --server.port=8081 --spring.profiles.active=druid
            Restart=always
            RestartSec=5
            User=root

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            for i in $(seq 1 60); do
              if curl -fsS --max-time 5 http://127.0.0.1:8081/app/home >/dev/null; then
                break
              fi
              sleep 1
            done
            systemctl --no-pager --full status "$SERVICE_NAME"
            curl -fsS --max-time 10 http://127.0.0.1:8081/app/home >/dev/null
